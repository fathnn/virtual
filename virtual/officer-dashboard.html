<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Petugas - VoiceConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            gap: 0;
            background: #000;
        }

        .header {
            grid-column: 1 / 3;
            background: linear-gradient(to right, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .call-timer {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .main-content {
            grid-column: 1;
            grid-row: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1.5rem;
        }

        .video-frame {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-feed {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-align: center;
        }

        .video-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .video-status {
            font-size: 1rem;
            opacity: 0.5;
        }

        .user-info-section {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-details h4 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .user-details p {
            margin: 0.25rem 0 0;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .sidebar {
            grid-column: 2;
            grid-row: 2;
            background: rgba(255, 255, 255, 0.03);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            overflow-y: auto;
        }

        .sidebar-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 0.75rem;
        }

        .call-info {
            background: rgba(99, 102, 241, 0.1);
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-bottom: 1.5rem;
        }

        .call-info-item {
            margin-bottom: 0.75rem;
        }

        .call-info-label {
            font-size: 0.75rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .call-info-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .controls {
            grid-column: 1 / 3;
            grid-row: 3;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 1.5rem;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            color: white;
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        .control-btn.primary:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .control-btn.primary.off {
            background: #ef4444;
        }

        .control-btn.end {
            background: #ef4444;
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
        }

        .control-btn.end:hover {
            background: #dc2626;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .main-content {
                grid-column: 1;
                grid-template-columns: 1fr;
            }

            .header {
                grid-column: 1;
                flex-direction: column;
                gap: 1rem;
            }

            .controls {
                grid-column: 1;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .control-btn.end {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="header">
            <div>
                <div style="font-size: 1.2rem; font-weight: 600;">Dashboard Petugas</div>
                <div style="font-size: 0.85rem; opacity: 0.7;" id="officerUserDisplay">Petugas</div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="statusText">Siap</span>
                </div>
                <div class="call-timer" id="callTimer">00:00</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Officer Video -->
            <div class="video-frame">
                <div class="video-feed">
                    <div class="video-placeholder">
                        <div class="video-icon"><i class="fas fa-user-tie"></i></div>
                        <div class="video-status">Video Anda</div>
                    </div>
                </div>
                <div class="user-info-section">
                    <div class="user-avatar" id="officerAvatar">P</div>
                    <div class="user-details">
                        <h4 id="officerUser">Petugas</h4>
                        <p id="officerId">ID</p>
                    </div>
                </div>
            </div>

            <!-- User Video -->
            <div class="video-frame">
                <div class="video-feed">
                    <div class="video-placeholder">
                        <div class="video-icon"><i class="fas fa-user"></i></div>
                        <div class="video-status" id="userVideoStatus">Menunggu Pengguna...</div>
                    </div>
                </div>
                <div class="user-info-section">
                    <div class="user-avatar" id="userAvatar">-</div>
                    <div class="user-details">
                        <h4 id="userName">-</h4>
                        <p id="userNik">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Info Panggilan</h3>
                <div class="call-info">
                    <div class="call-info-item">
                        <div class="call-info-label">Status</div>
                        <div class="call-info-value" id="callStatus">Menunggu</div>
                    </div>
                    <div class="call-info-item">
                        <div class="call-info-label">Durasi</div>
                        <div class="call-info-value" id="callDuration">00:00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn primary" id="micBtn" onclick="toggleMicrophone()">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn primary" id="cameraBtn" onclick="toggleCamera()">
                <i class="fas fa-video"></i>
            </button>
            <button class="control-btn end" onclick="endCall()">
                <i class="fas fa-phone-slash"></i>
            </button>
        </div>
    </div>

    <script>
        let callStartTime = null;
        let callTimer = null;
        let userConnected = false;

        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Officer dashboard loaded');
            initializeDashboard();
            checkUserConnection();
        });

        // ==================== Initialize Dashboard ====================
        function initializeDashboard() {
            const officerInfo = JSON.parse(localStorage.getItem('voiceconnect_officer'));
            if (!officerInfo) {
                window.location.href = 'index.html';
                return;
            }

            const avatar = officerInfo.userId.charAt(0).toUpperCase();
            document.getElementById('officerAvatar').textContent = avatar;
            document.getElementById('officerUser').textContent = officerInfo.userId;
            document.getElementById('officerId').textContent = officerInfo.userId;
            document.getElementById('officerUserDisplay').textContent = officerInfo.userId;

            console.log('Officer info loaded:', officerInfo.userId);
        }

        // ==================== Check User Connection ====================
        function checkUserConnection() {
            const checkInterval = setInterval(() => {
                const userInfo = JSON.parse(localStorage.getItem('voiceconnect_user'));
                if (userInfo) {
                    clearInterval(checkInterval);
                    connectUser(userInfo);
                }
            }, 500);

            setTimeout(() => clearInterval(checkInterval), 15000);
        }

        // ==================== Connect User ====================
        function connectUser(userInfo) {
            userConnected = true;
            
            const avatar = userInfo.name.charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = avatar;
            document.getElementById('userName').textContent = userInfo.name;
            document.getElementById('userNik').textContent = userInfo.nik;
            document.getElementById('userVideoStatus').textContent = 'Pengguna Terhubung';
            document.getElementById('statusText').textContent = 'Aktif';
            document.getElementById('callStatus').textContent = 'Aktif';
            
            startCallTimer();
            console.log('User connected:', userInfo.name);
        }

        // ==================== Call Timer ====================
        function startCallTimer() {
            callStartTime = Date.now();
            callTimer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                const timeStr = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                
                document.getElementById('callTimer').textContent = timeStr;
                document.getElementById('callDuration').textContent = timeStr;
            }, 1000);
        }

        // ==================== Toggle Microphone ====================
        function toggleMicrophone() {
            document.getElementById('micBtn').classList.toggle('off');
            console.log('Microphone toggled');
        }

        // ==================== Toggle Camera ====================
        function toggleCamera() {
            document.getElementById('cameraBtn').classList.toggle('off');
            console.log('Camera toggled');
        }

        // ==================== End Call ====================
        function endCall() {
            if (confirm('Akhiri panggilan?')) {
                clearInterval(callTimer);
                localStorage.removeItem('voiceconnect_officer');
                localStorage.removeItem('voiceconnect_user');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
